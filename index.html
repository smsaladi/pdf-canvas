<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Canvas</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2d2d2d" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <div class="toolbar-group">
          <button id="btn-open" class="tb" title="Open PDF (Ctrl+O)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14V2h7l3 3v9H2z"/><path d="M9 2v3h3"/></svg>
            <span>Open</span>
          </button>
          <button id="btn-save" class="tb" title="Save PDF (Ctrl+S)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 14H4a1 1 0 01-1-1V3a1 1 0 011-1h6l3 3v8a1 1 0 01-1 1z"/><path d="M10 2v3h3M5 10h6M5 12h4"/></svg>
            <span>Save</span>
          </button>
        </div>

        <span class="toolbar-sep"></span>

        <div class="toolbar-group" id="tool-group">
          <button class="tb tool-btn active" data-tool="select" title="Select / Move (V)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 1l9 6.5-4 .5 2.5 5-2 1L6 9l-3 3z"/></svg>
          </button>
          <button class="tb tool-btn" data-tool="hand" title="Hand / Pan (P)">
            <svg width="16" height="16" viewBox="0 -960 960 960" fill="currentColor"><path d="M480-60q-78 0-149-27.5T204-168L48-324l30-30q19-19 45-22t47 12l110 80v-436q0-17 11.5-28.5T320-760q17 0 28.5 11.5T360-720v280h40v-360q0-17 11.5-28.5T440-840q17 0 28.5 11.5T480-800v360h40v-320q0-17 11.5-28.5T560-800q17 0 28.5 11.5T600-760v320h40v-240q0-17 11.5-28.5T680-720q17 0 28.5 11.5T720-680v360q0 100-70 170T480-60Z"/></svg>
          </button>
          <button class="tb tool-btn" data-tool="textedit" title="Edit Text (T)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="5" y1="2" x2="11" y2="2"/><line x1="5" y1="14" x2="11" y2="14"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/></svg>
          </button>
          <button class="tb tool-btn" data-tool="note" title="Sticky Note (N)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="1"/><path d="M5 6h6M5 9h4"/></svg>
          </button>
          <button class="tb tool-btn" data-tool="freetext" title="Text Box (F)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 3v2h4v8h2V5h4V3z"/></svg>
          </button>
          <button class="tb tool-btn" data-tool="highlight" title="Highlight (H)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="5" width="14" height="6" rx="1" fill="#FFE066" opacity="0.7"/><path d="M3 8h10" stroke="#B8860B" stroke-width="1.5"/></svg>
          </button>
          <button class="tb tool-btn" data-tool="rectangle" title="Rectangle (R)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="1"/></svg>
          </button>
          <button class="tb tool-btn" data-tool="circle" title="Circle (C)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/></svg>
          </button>
          <button class="tb tool-btn" data-tool="line" title="Line (L)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="13" x2="13" y2="3"/></svg>
          </button>
          <button class="tb tool-btn" data-tool="ink" title="Freehand Draw (D)">
            <svg width="16" height="16" viewBox="0 -960 960 960" fill="currentColor"><path d="M547-144q-46 0-77-32t-31-80q0-69 62.5-127.5T649-454q-7-48-26-73t-49-25q-35 0-74.5 33.5T418-420q-44 68-85 100t-83 32q-45 0-72.5-31.5T150-402q0-42 20-90.5T231-599q29-41 43.5-70.5T289-719q0-11-4.5-17.5T272-743q-11 0-29 13.5T195-686l-51-50q44-44 73-62t56-18q37 0 62 27t25 68q0 33-19 75.5T287-555q-32 44-49 81.5T221-406q0 20 9 33t23 13q12 0 23.5-6.5T304-390q11-11 23.5-27.5T354-455q57-85 112-127t109-42q60 0 100 46t46 122h95v72h-92q0 95-53.5 167.5T547-144Zm3-71q37 0 69.5-53T652-381q-53 9-97.5 47.5T510-258q0 18 11.5 30.5T550-215Z"/></svg>
          </button>
          <button class="tb" id="btn-insert-image" title="Insert Image">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="1"/><circle cx="5.5" cy="6.5" r="1.5"/><path d="M2 11l3-3 2 2 3-4 4 5"/></svg>
          </button>
        </div>

        <span class="toolbar-sep"></span>

        <div class="toolbar-group" id="style-group">
          <label class="color-picker-wrap" title="Border / Stroke Color">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="12" height="12" rx="1"/></svg>
            <input type="color" id="toolbar-color" value="#ff0000" />
            <span class="color-swatch" id="color-swatch"></span>
          </label>
          <label class="color-picker-wrap" title="Fill Color">
            <svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="1" fill="currentColor" opacity="0.5"/></svg>
            <input type="color" id="toolbar-fill-color" value="#ffffff" />
            <span class="color-swatch" id="fill-swatch"></span>
          </label>
          <select id="toolbar-line-weight" class="toolbar-select" title="Line Weight">
            <option value="1">1pt</option>
            <option value="2" selected>2pt</option>
            <option value="3">3pt</option>
            <option value="4">4pt</option>
            <option value="6">6pt</option>
            <option value="8">8pt</option>
          </select>
        </div>

        <span class="toolbar-sep"></span>

        <div class="toolbar-group">
          <button id="btn-undo" class="tb" title="Undo (Ctrl+Z)" disabled>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h7a3 3 0 010 6H7" stroke-linecap="round"/><path d="M6 3L3 6l3 3"/></svg>
          </button>
          <button id="btn-redo" class="tb" title="Redo (Ctrl+Shift+Z)" disabled>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 6H6a3 3 0 000 6h3" stroke-linecap="round"/><path d="M10 3l3 3-3 3"/></svg>
          </button>
        </div>

        <span class="toolbar-sep"></span>

        <div class="toolbar-group">
          <button id="btn-zoom-out" class="tb" title="Zoom Out">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><line x1="11" y1="11" x2="14" y2="14"/><line x1="5" y1="7" x2="9" y2="7"/></svg>
          </button>
          <input id="zoom-input" class="zoom-input" type="text" value="150%" title="Zoom level" />
          <button id="btn-zoom-in" class="tb" title="Zoom In">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><line x1="11" y1="11" x2="14" y2="14"/><line x1="5" y1="7" x2="9" y2="7"/><line x1="7" y1="5" x2="7" y2="9"/></svg>
          </button>
          <button id="btn-fit-toggle" class="tb" title="Fit Width" data-fit="width">
            <svg id="fit-width-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="1" width="12" height="14" rx="1.5"/><path d="M5 8h6M5 5.5L3 8l2 2.5M11 5.5l2 2.5-2 2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <svg id="fit-height-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none"><rect x="2" y="1" width="12" height="14" rx="1.5"/><path d="M8 5v6M5.5 5L8 3l2.5 2M5.5 11L8 13l2.5-2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="btn-rotate-ccw" class="tb" title="Rotate Counterclockwise">
            <svg width="16" height="16" viewBox="0 -960 960 960" fill="currentColor"><path d="M528-84q-52 0-98.5-14.5T343-140l52-52q29 17 63 26.5t70 9.5q109 0 186.5-77.5T792-420q0-109-77.5-187.5T522-684l57 57-51 51-144-144 144-144 51 51-57 57q144-3 243 96.5T864-420q0 70-26.5 131t-72 106.5Q720-137 659-110.5T528-84Zm-240-96L48-420l240-240 240 240-240 240Zm0-102 138-138-138-138-138 138 138 138Zm0-138Z"/></svg>
          </button>
        </div>

        <span class="toolbar-sep"></span>

        <div class="toolbar-group page-nav-group">
          <button id="btn-prev-page" class="tb" title="Previous Page">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M10 3L5 8l5 5z"/></svg>
          </button>
          <input id="page-input" class="page-input" type="text" value="1" title="Go to page" />
          <span class="page-total">/ <span id="page-total">0</span></span>
          <button id="btn-next-page" class="tb" title="Next Page">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6 3l5 5-5 5z"/></svg>
          </button>
        </div>
      </div>
      <div id="main-area">
        <div id="thumbnail-sidebar"></div>
        <div id="search-bar"></div>
        <div id="viewport">
          <div id="welcome">
            <div class="welcome-content">
              <h1>PDF Canvas</h1>
              <p>Drop a PDF file here, or:</p>
              <div class="welcome-actions">
                <button id="btn-welcome-open" class="welcome-btn">Open PDF</button>
                <button id="btn-welcome-new" class="welcome-btn welcome-btn-secondary">New Blank Canvas</button>
              </div>
            </div>
          </div>
        </div>
        <div id="properties-panel">
          <div class="props-header">
            <span>Properties</span>
            <button id="btn-close-props" class="props-close-btn" title="Close">&times;</button>
          </div>
          <div class="props-body"></div>
        </div>
        <button id="btn-toggle-props" class="props-toggle-btn" title="Toggle Properties Panel">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12"/><line x1="10" y1="2" x2="10" y2="14"/></svg>
        </button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
